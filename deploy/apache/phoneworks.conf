<VirtualHost *:80>
    ServerName phoneworkslancaster.com
    ServerAlias www.phoneworkslancaster.com
    DocumentRoot /var/www/phoneworks/public

    <Directory /var/www/phoneworks/public>
        AllowOverride All
        Require all granted
    </Directory>

    RedirectMatch 302 ^/admin/?$ https://phoneworkslancaster.com/admin/index.php
    Alias /admin/ /var/www/shopsell/public/
    <Directory /var/www/shopsell/public>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
