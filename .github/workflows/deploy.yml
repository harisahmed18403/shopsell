name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shopsell-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: 159.223.245.73
      VPS_PORT: "22"
      VPS_USER: root

    steps:
      - name: Assert deploy key secret exists
        shell: bash
        run: |
          test -n "${{ secrets.VPS_DEPLOY_KEY }}" || { echo "VPS_DEPLOY_KEY is missing"; exit 1; }

      - name: Write deploy key
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.VPS_DEPLOY_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Validate deploy key format
        shell: bash
        run: |
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

      - name: Run deploy script on VPS
        shell: bash
        run: |
          ssh \
            -i ~/.ssh/deploy_key \
            -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST"
